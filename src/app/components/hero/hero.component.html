<!--
  SECCIÓN HERO
  Las clases "anim-fade-up delay-N" vienen de styles.css.
  Cada elemento aparece con un pequeño retardo (delay) para crear
  un efecto escalonado al cargar la página.
-->
<section id="hero" class="hero-section">
  <div class="container hero-inner">

    <!-- Columna de texto -->
    <div class="hero-text">
      <p class="hero-greeting anim-fade-up">{{ tr.t('hero.greeting') }}</p>

      <h1 class="hero-name anim-fade-up delay-1">
        {{ tr.t('hero.name') }}
      </h1>

      <h2 class="hero-title anim-fade-up delay-2">
        {{ tr.t('hero.title') }}
      </h2>

      <p class="hero-subtitle anim-fade-up delay-3">
        {{ tr.t('hero.subtitle') }}
      </p>

      <!-- Ubicación con ícono SVG inline -->
      <p class="hero-location anim-fade-up delay-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        {{ tr.t('hero.location') }}
      </p>

      <!-- Botones de acción -->
      <div class="hero-actions anim-fade-up delay-4">
        <a class="btn-primary" href="assets/Esteban_Cano_Estrada-Resume.pdf" target="_blank" rel="noopener">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          {{ tr.t('hero.download') }}
        </a>

        <a class="btn-outline" href="https://www.linkedin.com/in/esteban-cano-estrada" target="_blank" rel="noopener">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
               fill="currentColor">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
            <rect x="2" y="9" width="4" height="12"/>
            <circle cx="4" cy="4" r="2"/>
          </svg>
          LinkedIn
        </a>

        <a class="btn-outline" href="https://github.com/caes2004" target="_blank" rel="noopener">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
               fill="currentColor">
            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
          </svg>
          GitHub
        </a>
      </div>
    </div>

    <!-- Foto de perfil -->
    <div class="hero-photo-wrapper anim-fade-up delay-2">
      <div class="hero-photo-ring">
        <img
          src="assets/me.jpeg"
          alt="Foto de Esteban Cano Estrada"
          class="hero-photo"
          loading="eager"
        />
      </div>
      <!-- Indicador de disponibilidad -->
      <div class="availability-badge">
        <span class="availability-dot"></span>
        <span>{{ tr.lang() === 'es' ? 'Disponible' : 'Available' }}</span>
      </div>
    </div>

  </div>

  <!-- Flecha animada para hacer scroll hacia abajo -->
  <div class="scroll-hint anim-fade-up delay-5">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </div>
</section>
