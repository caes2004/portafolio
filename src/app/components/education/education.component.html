<section id="education" class="section" appRevealOnScroll>
  <div class="container">
    <h2 class="section-title">{{ tr.t('education.sectionTitle') }}</h2>

    <div class="education-card card">
      <div class="edu-header">
        <div class="edu-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
            <path d="M6 12v5c3 3 9 3 12 0v-5"/>
          </svg>
        </div>
        <div class="edu-info">
          <h3 class="edu-institution">{{ tr.t('education.school1.institution') }}</h3>
          <p class="edu-degree">{{ tr.t('education.school1.degree') }}</p>
          <div class="edu-meta">
            <span>
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
              {{ tr.t('education.school1.location') }}
            </span>
          </div>
        </div>
        <div class="edu-period">{{ tr.t('education.school1.period') }}</div>
      </div>

      <!-- Logro destacado -->
      <div class="edu-highlight">
        <span class="trophy-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="6"/>
            <path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/>
          </svg>
        </span>
        <span>{{ tr.t('education.school1.highlight') }}</span>
      </div>
    </div>
  </div>
</section>
