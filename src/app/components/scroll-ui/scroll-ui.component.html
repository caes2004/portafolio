<!--
  SCROLL UI — Barra de progreso + botón volver arriba
  ══════════════════════════════════════════════════════════════════
  Este template combina dos técnicas de Angular que vale la pena notar:

  ① [style.width.%]="progress()"  ← Property binding con unidad
    El corchete [ ] indica binding: Angular evalúa la expresión y
    la asigna como propiedad. El sufijo .% le dice a Angular que
    añada "%" como unidad. Resultado: width: 63% (por ejemplo).
    Se actualiza automáticamente cada vez que cambia el signal.

  ② @if (showBackToTop())  ← Control flow condicional
    El botón se AÑADE o ELIMINA del DOM según el valor del signal.
    Cuando showBackToTop() es false, el botón no existe en el HTML
    (no solo está oculto). Cuando es true, Angular lo crea.

  ③ (click)="scrollToTop()"  ← Event binding
    El paréntesis ( ) indica que escuchamos un evento del DOM.
    Cuando se hace clic en el botón, Angular llama a scrollToTop().
  ══════════════════════════════════════════════════════════════════
-->

<!-- ① Barra de progreso fija en la parte superior de la ventana -->
<div class="scroll-progress-bar" role="progressbar" [attr.aria-valuenow]="progress()" aria-valuemin="0" aria-valuemax="100">
  <!--
    [style.width.%] — el ancho de este div aumenta con el scroll.
    progress() devuelve 0 al inicio y 100 al final de la página.
    CSS hace la transición suave con transition: width 0.1s linear.
  -->
  <div class="scroll-progress-fill" [style.width.%]="progress()"></div>
</div>

<!-- ② Botón volver arriba — solo existe en el DOM cuando scrollY > 400px -->
@if (showBackToTop()) {
  <button
    class="back-to-top"
    (click)="scrollToTop()"
    aria-label="Volver al inicio de la página"
    title="Volver arriba"
  >
    <!-- Ícono SVG de flecha hacia arriba — estilo Lucide (igual que el resto del sitio) -->
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"/>
    </svg>
  </button>
}
