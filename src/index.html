<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Esteban Cano Estrada — Software Developer</title>
  <base href="/">

  <!-- Meta tags de SEO y redes sociales -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Portafolio de Esteban Cano Estrada, Software Developer especializado en backend Java, Spring Boot y microservicios. Medellín, Colombia.">
  <meta name="keywords" content="Esteban Cano, Software Developer, Java, Spring Boot, Microservicios, Medellín, Colombia">
  <meta name="author" content="Esteban Cano Estrada">

  <!--
    ═══════════════════════════════════════════════════════════════════
    OPEN GRAPH — Meta tags para compartir en LinkedIn, WhatsApp, etc.
    ─────────────────────────────────────────────────────────────────
    Cuando alguien pega tu URL en LinkedIn o WhatsApp, la plataforma
    lee estas etiquetas y construye una tarjeta visual con título,
    descripción e imagen. Sin ellas, solo aparece un enlace plano.

    ⚠️  IMPORTANTE ANTES DE DESPLEGAR:
    Reemplaza "https://TU-DOMINIO.vercel.app" por la URL real que
    Vercel asigne a tu proyecto. La puedes ver en el panel de Vercel
    tras el primer deploy (algo como https://my-resume-abc.vercel.app).
    og:image y og:url deben ser URLs absolutas (no rutas relativas).
    ═══════════════════════════════════════════════════════════════════
  -->

  <!-- Open Graph — LinkedIn, Facebook, WhatsApp, Telegram -->
  <meta property="og:title"       content="Esteban Cano Estrada — Software Developer">
  <meta property="og:description" content="Backend developer especializado en Java, Spring Boot y microservicios. Medellín, Colombia.">
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://TU-DOMINIO.vercel.app">
  <meta property="og:image"       content="https://TU-DOMINIO.vercel.app/assets/me.jpeg">
  <meta property="og:image:width"  content="800">
  <meta property="og:image:height" content="800">
  <meta property="og:locale"      content="es_CO">
  <meta property="og:site_name"   content="Esteban Cano — Portafolio">

  <!-- Twitter Card — también usado por iMessage y otras apps -->
  <meta name="twitter:card"        content="summary">
  <meta name="twitter:title"       content="Esteban Cano Estrada — Software Developer">
  <meta name="twitter:description" content="Backend developer especializado en Java, Spring Boot y microservicios. Medellín, Colombia.">
  <meta name="twitter:image"       content="https://TU-DOMINIO.vercel.app/assets/me.jpeg">

  <!-- Favicon SVG (moderno, escala perfecto a cualquier tamaño) -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="shortcut icon" type="image/svg+xml" href="favicon.svg">
  <!-- Fallback ICO para Safari/navegadores legacy — mismo diseño EC verde -->
  <link rel="icon" sizes="32x32" type="image/svg+xml" href="favicon.svg">
</head>
<body>
  <!--
    app-root es el selector del AppComponent (src/app/app.component.ts).
    Angular reemplaza este tag con el contenido del componente raíz.
    Es el punto de entrada de toda la aplicación.
  -->
  <app-root></app-root>
</body>
</html>
